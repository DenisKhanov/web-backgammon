services:
  postgres:
    image: postgres:16-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-backgammon}-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-backgammon}
      POSTGRES_USER: ${POSTGRES_USER:-bg_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bg_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bg_user}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      network: ${DOCKER_BUILD_NETWORK:-default}
    container_name: ${COMPOSE_PROJECT_NAME:-backgammon}-backend
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-bg_user}:${POSTGRES_PASSWORD:-bg_pass}@postgres:5432/${POSTGRES_DB:-backgammon}?sslmode=disable
      PORT: "8080"
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}
      MIGRATIONS_DIR: migrations
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      network: ${DOCKER_BUILD_NETWORK:-default}
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:8080}
    container_name: ${COMPOSE_PROJECT_NAME:-backgammon}-frontend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:8080}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
